<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>High-Performance Canvas Spreadsheet</title>
  <!-- <style 0></style> -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="sheet-container">
    <canvas id="canvas" tabindex="0"></canvas>
    <input type="text" id="cell-editor">
    <div id="spreadsheetStatusBar" style="
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background-color: #f3f3f3;
    border-top: 1px solid #dcdcdc;
    padding: 6px 16px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 12px;
    color: #444444;
    display: none; /* Hidden by default */
    justify-content: flex-end;
    gap: 20px;
    box-sizing: border-box;
    z-index: 100;
">
      <span id="metricAverage"></span>
      <span id="metricCount"></span>
      <span id="metricMin"></span>
      <span id="metricMax"></span>
      <span id="metricSum"></span>
    </div>


  </div>

  <script type="module" src="../dist/index.js"></script>
</body>

</html>
